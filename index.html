<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Город, координаты и часовой пояс</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; color:#0f172a; }
    h1 { margin-bottom: 12px; }
    p { color:#475569; line-height:1.5; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; font-size:16px; }
    button { background:#2563eb; color:white; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .list { border: 1px solid #cbd5e1; border-radius: 10px; overflow: hidden; margin-top:4px; }
    .item { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; cursor: pointer; background: #fff; }
    .item:last-child { border-bottom:none; }
    .item:hover { background: #f8fafc; }
    pre { background: #0b1730; color:#f8fafc; padding: 14px; border-radius: 12px; overflow: auto; white-space: pre-wrap; }
    label { display:block; font-weight:700; margin-top: 14px; }
    .row { display:grid; grid-template-columns: 1fr 180px; gap:12px; }
    .status { margin: 12px 0; color:#475569; }
  </style>
</head>
<body>
  <h1>Город, координаты и часовой пояс</h1>
  <p>Введите населённый пункт на кириллице, выберите вариант из списка, укажите дату и время. После этого страница вызовет серверный endpoint, который получит координаты, часовой пояс и результат из Prokerala API.</p>

  <label>Населённый пункт</label>
  <input id="cityInput" type="text" placeholder="Например: Київ" autocomplete="off" />
  <div id="suggestions" class="list"></div>

  <label>Дата и время</label>
  <div class="row">
    <input id="dateInput" type="date" />
    <input id="timeInput" type="time" />
  </div>

  <button id="runBtn" disabled>Получить данные</button>

  <div id="status" class="status">Готово.</div>

  <pre id="result">{}</pre>

  <script>
    const cityInput = document.getElementById('cityInput');
    const dateInput = document.getElementById('dateInput');
    const timeInput = document.getElementById('timeInput');
    const suggestions = document.getElementById('suggestions');
    const result = document.getElementById('result');
    const statusEl = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');

    let selectedPlace = null;
    let timer = null;

    function refreshButtonState() {
      runBtn.disabled = !(selectedPlace && dateInput.value && timeInput.value);
    }

    cityInput.addEventListener('input', () => {
      selectedPlace = null;
      refreshButtonState();
      clearTimeout(timer);
      suggestions.innerHTML = '';

      const q = cityInput.value.trim();
      if (q.length < 2) return;

      timer = setTimeout(async () => {
        try {
          statusEl.textContent = 'Поиск населённого пункта...';
          const resp = await fetch('/api/autocomplete?q=' + encodeURIComponent(q));
          const data = await resp.json();

          suggestions.innerHTML = '';
          (data.suggestions || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.text;
            div.onclick = () => {
              selectedPlace = item;
              cityInput.value = item.text;
              suggestions.innerHTML = '';
              statusEl.textContent = 'Населённый пункт выбран.';
              refreshButtonState();
            };
            suggestions.appendChild(div);
          });

          if (!(data.suggestions || []).length) {
            statusEl.textContent = 'Ничего не найдено.';
          }
        } catch (e) {
          statusEl.textContent = 'Ошибка поиска: ' + e.message;
          suggestions.innerHTML = '';
        }
      }, 300);
    });

    dateInput.addEventListener('change', refreshButtonState);
    timeInput.addEventListener('change', refreshButtonState);

    runBtn.addEventListener('click', async () => {
      if (!selectedPlace || !dateInput.value || !timeInput.value) return;

      result.textContent = 'Загрузка...';
      statusEl.textContent = 'Получение данных...';

      try {
        const resp = await fetch('/api/city-info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            placeId: selectedPlace.placeId,
            date: dateInput.value,
            time: timeInput.value
          })
        });

        const data = await resp.json();
        result.textContent = JSON.stringify(data, null, 2);
        statusEl.textContent = resp.ok ? 'Готово.' : 'Ошибка выполнения.';
      } catch (e) {
        result.textContent = JSON.stringify({ error: e.message }, null, 2);
        statusEl.textContent = 'Ошибка: ' + e.message;
      }
    });
  </script>
</body>
</html>
